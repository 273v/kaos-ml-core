# cargo-deny configuration for kaos-ml-core.
# Per docs/oss/30-rust-packaging/dep-policy.md and audit A2-#9.

[graph]
all-features = false
no-default-features = false

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
  # Known-but-non-impactful advisories (document with justification + ticket).
  # Empty: cargo update on 2026-05-05 brought rand 0.9.2 -> 0.9.4 which
  # clears RUSTSEC-2026-0097. Re-add entries here only after a rationale
  # review.
]

[licenses]
# cargo-deny v0.18 removed the legacy ``allow-osi-fsf-free`` knob; the
# allowlist below is the single source of truth.
allow = [
  "Apache-2.0",
  # Apache-2.0 with the LLVM exception is the LLVM / wasm / target-lexicon
  # license — Apache-2.0 plus a clarification about copyleft for derived
  # works. OSI-approved, permissive, used across the Rust ecosystem
  # (rustc, llvm-sys, target-lexicon, wasip2, wit-bindgen). Pulled in
  # transitively when cargo-deny runs against the musllinux build target.
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "MPL-2.0",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib",
  "0BSD",
]
exceptions = []
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = [
  # bincode 1.x is unmaintained per RUSTSEC-2025-0141; refuse re-introduction
  # without an explicit policy waiver. If we need binary serde later, pin
  # bincode 2.x with an audit waiver in this list.
  { name = "bincode", version = "<2.0.0" },
]
skip = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
