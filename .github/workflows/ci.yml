name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ────────────── lint (Python + Rust) ──────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - name: Cargo fmt
        run: cargo fmt --check

      - name: Cargo clippy (no PyO3 features)
        run: cargo clippy --no-default-features --all-targets -- -D warnings

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Install dependencies (transformers + mcp extras for ty resolution)
        # ty static-analyzes the pipeline.py / tools.py imports of
        # kaos_nlp_transformers.models and kaos_mcp; install both extras
        # so the symbols resolve. The runtime tests don't need this — the
        # imports are gated by try/except — but the type checker is strict.
        run: uv sync --group dev --extra transformers --extra mcp --python 3.13

      - name: Ruff format check
        run: uv run ruff format --check python/kaos_ml_core tests

      - name: Ruff lint
        run: uv run ruff check python/kaos_ml_core tests

      - name: Type check (ty)
        run: uv run ty check python/kaos_ml_core tests

  # ────────────── pre-commit ──────────────
  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Install dependencies (transformers + mcp for ty resolution)
        run: uv sync --group dev --extra transformers --extra mcp --python 3.13

      - name: Run pre-commit
        run: uvx pre-commit run --all-files --show-diff-on-failure

  # ────────────── Rust unit tests (pure Rust core) ──────────────
  rust-test:
    name: Rust tests (no PyO3)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cargo test (--no-default-features)
        run: cargo test --no-default-features --lib

  # ────────────── Python tests (Python × maturin develop) ──────────────
  test:
    name: Test (${{ matrix.display-os }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    # Linux x64 (ubuntu-latest) keeps the full 4-Python-version matrix
    # for fast PR feedback. macOS-arm64 + Windows-x64 each get a single
    # Python 3.13 leg, gated experimental until proven stable. Mirrors
    # the pattern landed in kaos-core / kaos-graph / kaos-nlp-core
    # ci.yml (E1-E3).
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x64 — full Python matrix ──
          - python-version: "3.13"
            os: ubuntu-latest
            display-os: linux-x64
            experimental: false
          - python-version: "3.14"
            os: ubuntu-latest
            display-os: linux-x64
            experimental: false
          - python-version: "3.14t"
            os: ubuntu-latest
            display-os: linux-x64
            experimental: true
          - python-version: "3.15"
            os: ubuntu-latest
            display-os: linux-x64
            experimental: true
          # ── macOS arm64 — single Python smoke ──
          - python-version: "3.13"
            os: macos-14
            display-os: macos-arm64
            experimental: true
          # ── Windows x64 — single Python smoke ──
          - python-version: "3.13"
            os: windows-latest
            display-os: windows-x64
            experimental: true
    continue-on-error: ${{ matrix.experimental }}
    env:
      # PEP 540 UTF-8 Mode + stdout encoding override — Windows
      # cp1252 default codepage crashes on Unicode stdout / file
      # opens without explicit encoding=. No-op on Linux/macOS.
      # Lessons from kaos-nlp-core E2 cross-OS work.
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-suffix: test-${{ matrix.display-os }}-py${{ matrix.python-version }}

      - name: Install Python ${{ matrix.python-version }}
        run: uv python install --preview ${{ matrix.python-version }}

      - name: Install system libraries for source-built C extensions
        # Linux-only: macOS / Windows runners don't have apt-get and
        # use cached wheels anyway. The 3.13 / 3.14 stable lanes also
        # hit cached wheels on Linux — this step is effectively a
        # no-op there.
        #
        # 3.15 (pre-release) currently has no published Pillow wheel,
        # so uv source-builds it. Pillow's setup.py raises
        # ``RequiredDependencyException: jpeg`` if libjpeg + zlib
        # headers are missing, and the same applies for the other
        # codecs in the [images] extra (used transitively by
        # kaos-content / kaos-ml-core's preprocessing path). See:
        # https://pillow.readthedocs.io/en/latest/installation/building-from-source.html
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libjpeg-dev zlib1g-dev libtiff-dev libfreetype6-dev \
            liblcms2-dev libwebp-dev libopenjp2-7-dev libimagequant-dev

      - name: Install dependencies
        # `shell: bash` for cross-OS consistency with Run tests below
        # (PowerShell mis-parses `\` continuations on Windows). The
        # uv sync line is single-line today, but normalising the shell
        # avoids drift if it gains continuations later.
        shell: bash
        run: uv sync --group dev --python ${{ matrix.python-version }}

      - name: Build PyO3 extension (maturin develop --release)
        run: uv run maturin develop --release

      - name: Run tests with coverage
        # `shell: bash` so the `\` line continuations parse on Windows
        # (default shell there is PowerShell which reads `\` as a unary
        # operator). Git Bash is preinstalled on `windows-latest`.
        shell: bash
        run: |
          uv run pytest \
            -m "not live and not network and not slow" \
            --cov=kaos_ml_core \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            tests/

      - name: Upload coverage report
        if: always() && !matrix.experimental
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-${{ matrix.display-os }}-py${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 14

  # ────────────── min-deps ──────────────
  min-deps:
    name: Test against minimum dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Install with lowest-direct resolution
        run: uv sync --group dev --resolution=lowest-direct --python 3.13

      - name: Build PyO3 extension
        run: uv run maturin develop --release

      - name: Run tests
        run: |
          uv run pytest \
            -m "not live and not network and not slow" \
            --no-cov \
            -q \
            tests/

  # ────────────── build + wheel smoke test ──────────────
  build:
    name: Build distribution + smoke test
    runs-on: ubuntu-latest
    needs: [lint, test, rust-test]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Build wheel + sdist
        run: uv build

      - name: Verify metadata (twine check)
        run: uvx --from twine twine check --strict dist/*

      - name: Smoke-test the built wheel in a clean venv
        run: |
          uv venv --python 3.13 /tmp/smoke
          # Install with [mcp] so register_ml_tools is reachable; the
          # actual ML-pipeline smoke (embed + train + predict) lives in
          # the integration tests, not in this fast-CI smoke.
          # Glob the built wheel so the smoke step survives version bumps;
          # the previous hardcoded ``-0.1.0a1-`` reference broke on every
          # subsequent release.
          uv pip install --python /tmp/smoke/bin/python "$(ls dist/kaos_ml_core-*-cp313-abi3-linux_x86_64.whl)[mcp]"
          /tmp/smoke/bin/python -c "
          import kaos_ml_core
          from kaos_ml_core import (
              Corpus, KaosMLCoreSettings, Metrics, Pipeline, PipelineError,
              SplitResult, ThresholdResult, aggregate_predictions, evaluate,
              stratified_split, tune_threshold, wilson_score_interval,
          )
          assert kaos_ml_core.__version__, 'version missing from wheel'
          assert len(kaos_ml_core.__all__) >= 22, f'unexpected public surface: {kaos_ml_core.__all__}'

          # Hard-rule enforcement primitives are reachable.
          lo, hi = wilson_score_interval(80, 100, confidence=0.95)
          assert 0.7 < lo < 0.72 and 0.86 < hi < 0.87

          # Four granularity levels supported.
          from kaos_content.model.blocks import Heading, Paragraph
          from kaos_content.model.document import ContentDocument
          from kaos_content.model.inlines import Text
          from kaos_content.model.metadata import DocumentMetadata, SourceRef
          doc = ContentDocument(
              metadata=DocumentMetadata(source=SourceRef(uri='smoke://1')),
              body=(
                  Heading(depth=1, children=(Text(value='Indemnification'),)),
                  Paragraph(children=(Text(value='The Seller indemnifies Buyer.'),)),
                  Paragraph(children=(Text(value='Cap is 10 percent.'),)),
              ),
          )
          assert len(Corpus.from_documents([doc], level='paragraph')) == 2
          assert len(Corpus.from_documents([doc], level='section')) == 1
          assert len(Corpus.from_documents([doc], level='document')) == 1

          # MCP tool surface registers 11 tools.
          from kaos_core import KaosRuntime
          from kaos_ml_core.tools import register_ml_tools
          rt = KaosRuntime()
          assert register_ml_tools(rt) == 11

          # Settings + Rust extension reachable.
          assert KaosMLCoreSettings().default_threshold == 0.5
          from kaos_ml_core._rust import version as rust_version_fn
          assert rust_version_fn() == kaos_ml_core.rust_version
          print(f'kaos-ml-core {kaos_ml_core.__version__}: smoke OK ({len(kaos_ml_core.__all__)} symbols, 11 MCP tools)')
          "
          # Exercise the CLI entrypoint.
          /tmp/smoke/bin/kaos-ml info --json

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7
