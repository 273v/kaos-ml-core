name: Release

on:
  push:
    tags:
      - "v*"
  # Manual fallback so a failed publish (e.g. transient PyPI 5xx) can be
  # retried without re-tagging.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ────────────── Pre-publish QA + sdist ──────────────
  # One job that gates everything else: verifies version sync, runs the
  # full QA gauntlet, builds + verifies the sdist (the format-agnostic
  # source artifact). Wheel-matrix jobs depend on this; if the source
  # tree is broken we never compile 8 wheels for nothing.
  sdist:
    name: Build sdist + pre-publish QA
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Install dependencies (transformers + mcp for ty resolution)
        run: uv sync --group dev --extra transformers --extra mcp --python 3.13

      - name: Verify Cargo.toml version matches tag
        id: version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          # Cargo SemVer "0.1.0-alpha.1" maps to PEP 440 "0.1.0a1".
          CARGO_VERSION=$(awk -F\" '/^version = "/{print $2; exit}' Cargo.toml)
          # Normalize Cargo SemVer "X.Y.Z-alpha.N" -> PEP 440 "X.Y.ZaN" etc.
          PEP440_VERSION=$(echo "$CARGO_VERSION" \
            | sed -E 's/-alpha\.([0-9]+)$/a\1/' \
            | sed -E 's/-beta\.([0-9]+)$/b\1/' \
            | sed -E 's/-rc\.([0-9]+)$/rc\1/')
          TAG=${GITHUB_REF_NAME#v}
          if [ "$PEP440_VERSION" != "$TAG" ]; then
            echo "::error::Tag '$TAG' does not match Cargo.toml-derived PEP 440 version '$PEP440_VERSION' (Cargo SemVer '$CARGO_VERSION')"
            exit 1
          fi
          echo "version=$PEP440_VERSION" >> "$GITHUB_OUTPUT"
          echo "kaos-ml-core release: tag=$TAG, cargo=$CARGO_VERSION, pep440=$PEP440_VERSION"

      - name: Pre-publish QA — Rust
        run: |
          cargo fmt --check
          cargo clippy --no-default-features --all-targets -- -D warnings
          cargo test --no-default-features --lib

      - name: Pre-publish QA — Python (build extension first)
        run: |
          uv run maturin develop --release
          uv run ruff format --check python/kaos_ml_core tests
          uv run ruff check python/kaos_ml_core tests
          uv run ty check python/kaos_ml_core tests
          uv run pytest -m "not live and not network and not slow" --no-cov tests/

      - name: Build sdist
        run: uv run maturin sdist --out dist

      - name: Verify sdist metadata
        run: uvx --from twine twine check --strict dist/*.tar.gz

      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz
          retention-days: 30

  # ────────────── Wheel matrix ──────────────
  # 5 wheels per release:
  #   - Linux x86_64 manylinux_2_28
  #   - Linux aarch64 manylinux_2_28
  #   - macOS arm64
  #   - Windows x86_64
  #   - Windows arm64
  #
  # musllinux deliberately skipped to keep the kaos-* family deployment
  # story consistent. kaos-nlp-transformers can't ship musllinux —
  # ort/download-binaries pulls Microsoft's official libonnxruntime
  # which is glibc-only — and shipping kaos-ml-core / kaos-graph / etc.
  # on Alpine while the downstream sibling can't install creates a
  # fragmented user experience. Pre-1.0 alpha allows the platform
  # reduction; downstream Alpine consumers should pin to the last
  # release that included musllinux wheels until either ort gains
  # musl support or we switch ML runtimes.
  #
  # macOS x86_64 deliberately skipped (Apple ended Intel sales in 2023).
  wheels:
    name: ${{ matrix.target }} ${{ matrix.linux-tag && '(' || '' }}${{ matrix.linux-tag }}${{ matrix.linux-tag && ')' || '' }}
    needs: sdist
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            linux-tag: manylinux_2_28
            manylinux: "2_28"
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            linux-tag: manylinux_2_28
            manylinux: "2_28"
          - os: macos-14
            target: aarch64-apple-darwin
            linux-tag: ""
            manylinux: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            linux-tag: ""
            manylinux: ""
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            linux-tag: ""
            manylinux: ""
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python (host)
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build wheel via PyO3/maturin-action
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          # Empty for macOS/Windows; "2_28" for Linux.
          manylinux: ${{ matrix.manylinux }}
          args: --release --strip --out dist
          # Don't restore from cache — release builds must be reproducible
          # from a clean state (per docs/oss/30-rust-packaging/wheel-matrix.md).
          rust-toolchain: stable
          sccache: "true"

      - name: Smoke test the wheel
        # Runs on every built wheel; each matrix leg's runner IS the
        # target platform so the cdylib gets exercised on its actual
        # native ABI before publish. Catches PE/ELF/Mach-O dyld
        # issues, ABI mismatches, and missing-runtime-dep surprises
        # the build step alone can't see. publish-pypi gates on
        # `needs: [sdist, wheels]`, so a smoke failure blocks the
        # release rather than shipping a broken wheel.
        #
        # `shell: bash` for multi-line `run:` / `[[ -f ... ]]` on
        # Windows (Git Bash preinstalled). PYTHONUTF8 + PYTHONIOENCODING
        # handle cp1252 default codepage. Lessons from the kaos-*
        # family ci.yml cross-OS work.
        shell: bash
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: utf-8
        run: |
          python -m venv .smoke-venv
          if [[ -f .smoke-venv/bin/python ]]; then
            PY=".smoke-venv/bin/python"
          else
            PY=".smoke-venv/Scripts/python"
          fi
          "$PY" -m pip install --upgrade pip
          "$PY" -m pip install dist/*.whl
          # Touch the cdylib directly via _rust.__version__ so a load
          # failure surfaces here rather than leaking past `import
          # kaos_ml_core` (the top-level __init__.py also imports from
          # _rust, so this is belt-and-suspenders).
          "$PY" -c "
          import kaos_ml_core as k
          assert k.__version__, 'version missing from wheel'
          from kaos_ml_core._rust import __version__ as rust_version
          assert rust_version, 'cdylib __version__ missing — extension load failed'
          print(f'kaos-ml-core {k.__version__} (cdylib {rust_version}): smoke OK')
          "

      - name: Upload wheel
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.target }}-${{ matrix.linux-tag || matrix.os }}
          path: dist/*.whl
          retention-days: 30

  # ────────────── Publish to PyPI via OIDC ──────────────
  publish-pypi:
    name: Publish to PyPI
    needs: [sdist, wheels]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/kaos-ml-core
    permissions:
      id-token: write  # OIDC for Trusted Publishing
    steps:
      - name: Download sdist
        uses: actions/download-artifact@v8
        with:
          name: sdist
          path: dist/

      - name: Download all wheels
        uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          path: dist/
          merge-multiple: true

      - name: Show artifact set
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
          skip-existing: false

  # ────────────── GitHub Release ──────────────
  github-release:
    name: Create GitHub Release
    needs: [sdist, wheels]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download sdist
        uses: actions/download-artifact@v8
        with:
          name: sdist
          path: dist/

      - name: Download all wheels
        uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          PRERELEASE_FLAG=""
          if [[ "$VERSION" == *a* || "$VERSION" == *b* || "$VERSION" == *rc* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$GITHUB_REF_NAME" \
            --title "kaos-ml-core $VERSION" \
            --notes-from-tag \
            $PRERELEASE_FLAG \
            dist/*
